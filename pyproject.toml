[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true
mypy_path = "src"
files = "src"

exclude = ["src/tests/"]

[[tool.mypy.overrides]]
module = ["pygame.*", "scene.*", "numpy.*", "ui", "ui.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["keyboard_ios", "display_ios", "main_ios"]
ignore_errors = true
