# Ruff configuration for pyapple2

[lint]
# Enable common rules
select = ["E", "F", "W", "I", "B", "C4", "UP"]
ignore = [
    "E501",  # Line too long (handled elsewhere)
    "E741",  # Ambiguous variable name (common in emulator code)
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# Tests can have unused imports for fixtures
"**/tests/*.py" = ["F401"]

[format]
# Use double quotes for strings
quote-style = "double"

# Indent with 4 spaces
indent-style = "space"
